<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Books</title>
    <link rel="stylesheet" href="styles.css">

    <!-- 🔒 LOGIN CHECK (ADDED HERE) -->
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>View Books</h2>

        <button id="loadBooksBtn">Load Books</button>

        <table id="booksTable">
            <thead>
                <tr>
                    <th>Book ID</th>
                    <th>Title</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="view_books.js"></script>

</body>
</html>
