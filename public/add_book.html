<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Book</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

<h2>Add New Book</h2>

<form id="bookForm">
    <label>Title:</label>
    <input type="text" id="title" required><br><br>

    <label>Author:</label>
    <input type="text" id="author" required><br><br>

    <label>Stock:</label>
    <input type="number" id="stock" required><br><br>

    <button type="submit">Add Book</button>
</form>

<p id="message" style="color: green; font-size:18px;"></p>

<script src="add_book.js"></script>
</body>
</html>
