<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Book</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Issue Book</h2>

        <form id="issueForm">

            <div class="form-group">
                <label for="issueBookId">Book ID:</label>
                <input type="text" id="issueBookId" required>
            </div>

            <div class="form-group">
                <label for="issueStudentId">Student ID:</label>
                <input type="text" id="issueStudentId" required>
            </div>

            <button type="submit">Issue Book</button>
        </form>

        <p id="issueMsg" class="msg"></p>
    </div>
</div>

<script src="issue_book.js"></script>

</body>
</html>
