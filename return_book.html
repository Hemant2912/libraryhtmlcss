<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Book</title>
    <link rel="stylesheet" href="styles.css">

    <!-- 🔒 LOGIN CHECK (ADDED HERE) -->
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Return Book</h2>

        <form id="returnForm">

            <div class="form-group">
                <label for="returnBookId">Book ID:</label>
                <input type="text" id="returnBookId" required>
            </div>

            <div class="form-group">
                <label for="returnStudentId">Student ID:</label>
                <input type="text" id="returnStudentId" required>
            </div>

            <button type="submit">Return Book</button>
        </form>

        <p id="returnMsg" class="msg"></p>
    </div>
</div>

<script src="return_book.js"></script>

</body>
</html>
